services:
  api:
    build:
      context: ..         
      dockerfile: docker/Dockerfile
    command: python -m uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: ../.env
    volumes:
      - mediq_data:/app/memory.db

  ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      - api

volumes:
  mediq_data:
